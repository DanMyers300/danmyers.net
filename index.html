<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Information</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    h1, h2, h3 {
      color: #333;
      text-align: center;
    }
    #resumeData {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    p {
      margin: 10px 0;
    }
    a {
      color: #007bff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    ul {
      margin: 10px 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>

  <h1>Resume Information</h1>

  <div id="resumeData">
    <p>Loading...</p>
  </div>

  <script id="resumeTemplate" type="text/template">
    <h2>Name: {{name}}</h2>
    <p>Label: {{label}}</p>
    <p>Email: {{email}}</p>
    <p>Phone: {{phone}}</p>
    <p>URL: <a href="{{url}}">{{url}}</a></p>
    <p>Summary: {{summary}}</p>
    <p>Location: {{location.city}}, {{location.region}}, {{location.countryCode}} {{location.postalCode}}</p>

    <h3>Work Experience</h3>
    {{#each work}}
      <p><strong>{{name}}</strong></p>
      <p>Position: {{position}}</p>
      <p>URL: <a href="{{url}}">{{url}}</a></p>
      <p>Start Date: {{startDate}}</p>
      <p>End Date: {{endDate}}</p>
      <p>Summary: {{summary}}</p>
      <p>Highlights: <ul>
      {{#each highlights}}
        <li>{{this}}</li>
      {{/each}}
      </ul></p>
    {{/each}}

    <h3>Interests</h3>
    {{#each interests}}
      <p><strong>{{name}}</strong></p>
      <p>Keywords: {{keywords.join ", "}}</p>
    {{/each}}
  </script>

  <script>
    window.onload = function() {
      fetchResumeData();
    };

    function fetchResumeData() {
      fetch("https://api.danmyers.net")
        .then(response => {
          if (!response.ok) {
            throw new Error("Failed to fetch resume data.");
          }
          return response.json();
        })
        .then(data => displayResumeData(data.body.resumeData))
        .catch(error => {
          document.getElementById("resumeData").innerHTML = "<p>" + error.message + "</p>";
        });
    }

    function displayResumeData(resumeData) {
      var resumeTemplate = document.getElementById("resumeTemplate").innerHTML;
      var resumeDiv = document.getElementById("resumeData");
      resumeDiv.innerHTML = Mustache.render(resumeTemplate, resumeData);
    }
  </script>

  <!-- Include Mustache.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>

</body>
</html>
