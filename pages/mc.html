<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Minecraft</title>
    <link rel="stylesheet" href="../css/mc.css">
    <script src="../js/mc.js"></script>
</head>
<body>
    <div class="alert_wrapper">
        <h2> Use </h2>
        <h1 id="serverUrl" style="font-size: 2em; text-decoration: underline;">mc.danmyers.net</h1>
        <h2> to connect to the server</h2>
    </div>
    <!-- Main Section -->
    <div class="overlay"></div>
    <div class="stars" aria-hidden="true"></div>
    <div class="starts2" aria-hidden="true"></div>
    <div class="stars3" aria-hidden="true"></div>
    <main class="main">
        <section class="contact">
            <h1 class="title"><a style="text-decoration: none;" href="../index.html">DanMyers.net</a></h1>
            <!-- Toggle Switch -->
                <label class="toggle-switch" for="serverToggle">
                    <input type="checkbox" id="serverToggle" />
                    <span class="slider" tabindex="0"></span>
                </label>
            <p class="statusText" id="statusText">
                Click the switch to start or stop the server.
            </p>
        </section>
    </main>
</body>
</html>
